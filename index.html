<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png" sizes="32x32">
    <script type="text/javascript" src="index.js"></script>
    <title>Hayashi's Journal</title>
</head>
<body onload="onLoad()">
    <div class="main-container">
        <h1 class="title">Hayashi's Journal</h1>
        <div class="journal">
            <ul class="names">
                <li id="arane" class="selected">Arane</li>
                <li id="akira">Akira</li>
            </ul>
            <ul class="entries">
                <li class="hbox">
                    <div class="entry">
                        <div class="entry-header">
                            <h2 class="entry-title">Day 31 -- Cooking Date</h2>
                            <div class="entry-characters">
                                <h2>Characters: <span class="characters-list"></span></h2>
                            </div>
                        </div>
                        <p class="entry-body">Today, Arane came over to my house for our cooking date.</p>
                    </div>
                    <div class="play-button">▶ Play</div>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
