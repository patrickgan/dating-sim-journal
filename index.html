<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script type="text/javascript" src="index.js"></script>
    <title>Journal</title>
</head>
<body onload="addEventListeners()">
    <div class="main-container">
        <h1 class="title">Hayashi's Journal</h1>
        <div class="journal">
            <ul class="names">
                <li id="arane" class="selected">Arane</li>
                <li id="akira">Akira</li>
            </ul>
            <ul class="entries">
                <li>
                    <div class="hbox">
                        <h2>Day 31 -- Cooking Date</h2>
                        <div class="play-button">▶ Play</div>
                    </div>
                    <p>Today, Arane came over to my house for our cooking date.</p>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
